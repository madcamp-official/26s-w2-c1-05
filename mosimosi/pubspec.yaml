name: mosimosi
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.2.1
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^9.2.2
  flutter_soloud: ^4.0.12
  flutter_tts: ^4.2.5
  go_router: ^17.3.0
  http: ^1.2.2
  just_audio: ^0.10.6
  just_audio_media_kit: ^2.1.0
  media_kit_libs_windows_audio: ^1.0.9
  path_provider: ^2.1.5
  record: ^7.1.1
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/brand/
    - assets/sounds/
  # 디자인 시스템 지정 폰트 (모두 SIL OFL): display/body/numeric
  fonts:
    - family: BlackHanSans
      fonts:
        - asset: assets/fonts/BlackHanSans-Regular.ttf
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
        - asset: assets/fonts/Pretendard-ExtraBold.otf
          weight: 800
    - family: IBMPlexMono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexMono-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexMono-Bold.ttf
          weight: 700
